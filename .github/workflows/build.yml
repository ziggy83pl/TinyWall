name: Build TinyWall

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  test:
    name: Unit Testy (.NET 8)
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Przywróć paczki
        run: dotnet restore TinyWall.Tests/TinyWall.Tests.csproj
        shell: pwsh
      - name: Uruchom testy
        run: |
          dotnet test TinyWall.Tests/TinyWall.Tests.csproj `
            --configuration Release `
            --logger "console;verbosity=normal" `
            --collect:"XPlat Code Coverage"
        shell: pwsh
      - name: Upload wyników testów
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: TinyWall.Tests/TestResults/
          retention-days: 14

  build-msi:
    name: Build MSI (.NET 4.8)
    runs-on: windows-2022
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Instalacja WiX
        run: |
          choco install wixtoolset --version=3.11.2 -y
          echo "C:\Program Files (x86)\WiX Toolset v3.11\bin" >> $env:GITHUB_PATH
        shell: pwsh
      - name: NuGet restore
        run: nuget restore TinyWall.sln
        shell: pwsh
      - name: Build TinyWall net48
        run: |
          & "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\MSBuild\Current\Bin\MSBuild.exe" `
            TinyWall\TinyWall.csproj /p:Configuration=Release /p:Platform=AnyCPU /p:TargetFramework=net48 /m
        shell: pwsh
      - name: Przygotuj pliki MSI
        run: |
          $src = "TinyWall\bin\Release\"
          $dst = "MsiSetup\Sources\ProgramFiles\TinyWall\"
          if (!(Test-Path $dst)) { New-Item -ItemType Directory -Path $dst -Force }
          Copy-Item "$src\*" $dst -Recurse -Force
        shell: pwsh
      - name: Build MSI
        run: |
          & "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\MSBuild\Current\Bin\MSBuild.exe" `
            MsiSetup\MsiSetup.wixproj /p:Configuration=Release /p:Platform=x86 /m
        shell: pwsh
      - name: Znajdź i wgraj MSI
        run: |
          $msi = Get-ChildItem -Path "MsiSetup\bin\Release\" -Filter "*.msi" | Select-Object -First 1
          echo "MSI_PATH=$($msi.FullName)" >> $env:GITHUB_OUTPUT
        id: find_msi
        shell: pwsh
      - uses: actions/upload-artifact@v4
        with:
          name: TinyWall-Installer-net48
          path: ${{ steps.find_msi.outputs.MSI_PATH }}
          retention-days: 30

  build-net8:
    name: Build EXE (.NET 8)
    runs-on: windows-2022
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Build net8.0-windows
        run: |
          dotnet build TinyWall\TinyWall.csproj `
            --configuration Release --framework net8.0-windows
        shell: pwsh
      - uses: actions/upload-artifact@v4
        with:
          name: TinyWall-net8-exe
          path: TinyWall\bin\Release\
          retention-days: 14
